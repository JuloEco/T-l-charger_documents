<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partage de Fichiers Local</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 700px;
            margin-top: 40px;
        }

        h1 {
            text-align: center;
            color: var(--text);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        /* Zone de Drop */
        .drop-zone {
            background-color: var(--card-bg);
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .drop-zone:hover, .drop-zone.drag-over {
            border-color: var(--accent);
            background-color: rgba(56, 189, 248, 0.05);
        }

        .drop-zone p {
            margin: 10px 0 0 0;
            font-size: 1.1rem;
            color: var(--text);
        }

        .drop-zone span {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        #file-input {
            display: none;
        }

        /* Liste des fichiers */
        .file-list {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .file-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .file-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .file-name {
            font-weight: 600;
            color: var(--text);
            word-break: break-all;
        }

        .file-size {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .download-btn {
            background-color: var(--accent);
            color: var(--bg-color);
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.2s ease;
            white-space: nowrap;
        }

        .download-btn:hover {
            background-color: var(--accent-hover);
        }

        .no-files {
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Partage de Fichiers</h1>
        <p class="subtitle">Ajoutez vos fichiers pour les rendre disponibles au téléchargement immédiatement.</p>

        <!-- Zone d'ajout -->
        <div class="drop-zone" id="drop-zone">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            <p>Glissez-déposez vos fichiers ici</p>
            <span>ou cliquez pour parcourir votre ordinateur</span>
            <input type="file" id="file-input" multiple>
        </div>

        <!-- Section Liste -->
        <div class="file-list" id="file-list">
            <div class="no-files" id="no-files-message">Aucun fichier disponible pour le moment.</div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const fileList = document.getElementById('file-list');
        const noFilesMessage = document.getElementById('no-files-message');

        // Gérer le clic sur la zone pour ouvrir l'explorateur
        dropZone.addEventListener('click', () => fileInput.click());

        // Événements de Drag & Drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drag-over');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            handleFiles(e.dataTransfer.files);
        });

        // Gérer la sélection classique via explorateur
        fileInput.addEventListener('change', () => {
            handleFiles(fileInput.files);
        });

        // Traitement et affichage des fichiers
        function handleFiles(files) {
            if (files.length > 0) {
                noFilesMessage.style.display = 'none';
            }

            Array.from(files).forEach(file => {
                // Créer un lien Blob temporaire pour le téléchargement local
                const fileURL = URL.createObjectURL(file);
                
                // Formater la taille du fichier
                const sizeStr = formatBytes(file.size);

                // Création de la carte HTML pour le fichier
                const card = document.createElement('div');
                card.className = 'file-card';

                card.innerHTML = `
                    <div class="file-info">
                        <span class="file-name">${file.name}</span>
                        <span class="file-size">${sizeStr}</span>
                    </div>
                    <a href="${fileURL}" download="${file.name}" class="download-btn">Télécharger</a>
                `;

                fileList.appendChild(card);
            });
        }

        // Fonction utilitaire pour formater la taille des fichiers
        function formatBytes(bytes, decimals = 2) {
            if (bytes === 0) return '0 Octet';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Octets', 'Ko', 'Mo', 'Go', 'To'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
        }
    </script>
</body>
</html>
